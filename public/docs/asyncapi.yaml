asyncapi: 3.0.0
info:
  title: AulaLive Realtime API
  version: 1.0.0
  description: |
    Contrato de eventos Socket.IO para el servicio realtime de AulaLive.

    Flujo base:
    1. Cliente se conecta enviando token Firebase en handshake.auth.token.
    2. Cliente emite join_room para unirse y recibir historial.
    3. Cliente emite message para enviar mensajes a la sala.

servers:
  production:
    host: your-service-name.onrender.com
    protocol: wss
    description: Render (produccion)
  local:
    host: localhost:4000
    protocol: ws
    description: Desarrollo local

defaultContentType: application/json

channels:
  join_room:
    address: join_room
    messages:
      joinRoomMessage:
        $ref: '#/components/messages/JoinRoomMessage'
  leave_room:
    address: leave_room
    messages:
      leaveRoomMessage:
        $ref: '#/components/messages/LeaveRoomMessage'
  message:
    address: message
    messages:
      messageCommand:
        $ref: '#/components/messages/SendMessageCommand'
      messageBroadcast:
        $ref: '#/components/messages/MessageBroadcast'
  webrtc_offer:
    address: webrtc_offer
    messages:
      offerMessage:
        $ref: '#/components/messages/WebRTCOfferMessage'

  webrtc_answer:
    address: webrtc_answer
    messages:
      answerMessage:
        $ref: '#/components/messages/WebRTCAnswerMessage'

  webrtc_ice_candidate:
    address: webrtc_ice_candidate
    messages:
      iceCandidateMessage:
        $ref: '#/components/messages/WebRTCIceCandidateMessage'

  peer_joined:
    address: peer_joined
    messages:
      peerJoinedMessage:
        $ref: '#/components/messages/PeerJoinedMessage'

  peer_left:
    address: peer_left
    messages:
      peerLeftMessage:
        $ref: '#/components/messages/PeerLeftMessage'

  media_state:
    address: media_state
    messages:
      mediaStateMessage:
        $ref: '#/components/messages/MediaStateMessage'

  media_state_changed:
    address: media_state_changed
    messages:
      mediaStateChangedMessage:
        $ref: '#/components/messages/MediaStateChangedMessage'
  

operations:
  sendJoinRoom:
    action: send
    channel:
      $ref: '#/channels/join_room'
    summary: Unirse a una sala y recibir historial por ack.
    messages:
      - $ref: '#/channels/join_room/messages/joinRoomMessage'
    x-ack:
      $ref: '#/components/schemas/JoinRoomAck'

  sendLeaveRoom:
    action: send
    channel:
      $ref: '#/channels/leave_room'
    summary: Salir de una sala.
    messages:
      - $ref: '#/channels/leave_room/messages/leaveRoomMessage'

  sendMessage:
    action: send
    channel:
      $ref: '#/channels/message'
    summary: Enviar un mensaje a una sala.
    messages:
      - $ref: '#/channels/message/messages/messageCommand'
    x-ack:
      $ref: '#/components/schemas/SendMessageAck'

  receiveMessage:
    action: receive
    channel:
      $ref: '#/channels/message'
    summary: Recibir broadcast de mensajes nuevos de la sala.
    messages:
      - $ref: '#/channels/message/messages/messageBroadcast'

  sendWebRTCOffer:
    action: send
    channel:
      $ref: '#/channels/webrtc_offer'
    summary: Enviar una oferta SDP a otro participante.
    messages:
      - $ref: '#/channels/webrtc_offer/messages/offerMessage'

  receiveWebRTCOffer:
    action: receive
    channel:
      $ref: '#/channels/webrtc_offer'
    summary: Recibir una oferta SDP.
    messages:
      - $ref: '#/channels/webrtc_offer/messages/offerMessage'

  sendWebRTCAnswer:
    action: send
    channel:
      $ref: '#/channels/webrtc_answer'
    summary: Responder una oferta SDP.
    messages:
      - $ref: '#/channels/webrtc_answer/messages/answerMessage'

  receiveWebRTCAnswer:
    action: receive
    channel:
      $ref: '#/channels/webrtc_answer'
    summary: Recibir una respuesta SDP.
    messages:
      - $ref: '#/channels/webrtc_answer/messages/answerMessage'

  sendIceCandidate:
    action: send
    channel:
      $ref: '#/channels/webrtc_ice_candidate'
    summary: Enviar un ICE Candidate.
    messages:
      - $ref: '#/channels/webrtc_ice_candidate/messages/iceCandidateMessage'

  receiveIceCandidate:
    action: receive
    channel:
      $ref: '#/channels/webrtc_ice_candidate'
    summary: Recibir un ICE Candidate.
    messages:
      - $ref: '#/channels/webrtc_ice_candidate/messages/iceCandidateMessage'

  receivePeerJoined:
    action: receive
    channel:
      $ref: '#/channels/peer_joined'
    summary: Notificación cuando un participante entra a la sala.
    messages:
      - $ref: '#/channels/peer_joined/messages/peerJoinedMessage'

  receivePeerLeft:
    action: receive
    channel:
      $ref: '#/channels/peer_left'
    summary: Notificación cuando un participante abandona la sala.
    messages:
      - $ref: '#/channels/peer_left/messages/peerLeftMessage'

  sendMediaState:
    action: send
    channel:
      $ref: '#/channels/media_state'
    summary: Actualizar estado del micrófono, cámara y pantalla.
    messages:
      - $ref: '#/channels/media_state/messages/mediaStateMessage'

  receiveMediaState:
    action: receive
    channel:
      $ref: '#/channels/media_state_changed'
    summary: Recibir cambios de estado multimedia de otro participante.
    messages:
      - $ref: '#/channels/media_state_changed/messages/mediaStateChangedMessage'

components:
  securitySchemes:
    firebaseBearer:
      type: httpApiKey
      in: query
      name: token
      description: |
        Token Firebase enviado por Socket.IO en handshake.auth.token.

  messages:
    JoinRoomMessage:
      name: join_room
      title: Join room command
      payload:
        $ref: '#/components/schemas/JoinRoomPayload'
      examples:
        - name: Join sala ABC123
          payload:
            roomId: ABC123

    LeaveRoomMessage:
      name: leave_room
      title: Leave room command
      payload:
        $ref: '#/components/schemas/LeaveRoomPayload'

    SendMessageCommand:
      name: message
      title: Send chat message command
      payload:
        $ref: '#/components/schemas/SendMessagePayload'
      examples:
        - name: Mensaje normal
          payload:
            roomId: ABC123
            text: Hola equipo

    MessageBroadcast:
      name: message
      title: Message broadcast event
      payload:
        $ref: '#/components/schemas/RealtimeMessage'

    WebRTCOfferMessage:
      name: webrtc_offer
      payload:
        $ref: '#/components/schemas/WebRTCOfferPayload'

    WebRTCAnswerMessage:
      name: webrtc_answer
      payload:
        $ref: '#/components/schemas/WebRTCAnswerPayload'

    WebRTCIceCandidateMessage:
      name: webrtc_ice_candidate
      payload:
        $ref: '#/components/schemas/WebRTCIceCandidatePayload'

    PeerJoinedMessage:
      name: peer_joined
      payload:
        $ref: '#/components/schemas/PeerJoinedPayload'

    PeerLeftMessage:
      name: peer_left
      payload:
        $ref: '#/components/schemas/PeerLeftPayload'

    MediaStateMessage:
      name: media_state
      payload:
        $ref: '#/components/schemas/MediaStatePayload'

    MediaStateChangedMessage:
      name: media_state_changed
      payload:
        $ref: '#/components/schemas/MediaStateChangedPayload'

  schemas:
    JoinRoomPayload:
      type: string
      description: roomId en formato string (se normaliza a uppercase en backend).
      examples:
        - ABC123

    LeaveRoomPayload:
      type: string
      description: roomId en formato string.
      examples:
        - ABC123

    SendMessagePayload:
      type: object
      additionalProperties: false
      required:
        - roomId
        - text
      properties:
        roomId:
          type: string
          minLength: 1
          description: ID de la sala.
        text:
          type: string
          minLength: 1
          maxLength: 2000
          description: Texto del mensaje.

    RealtimeMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - text
        - userUid
      properties:
        id:
          type: string
        text:
          type: string
        userUid:
          type: string
        displayName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    JoinRoomAck:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - ok
            - messages
          properties:
            ok:
              type: boolean
              const: true
            messages:
              type: array
              items:
                $ref: '#/components/schemas/RealtimeMessage'
        - type: object
          additionalProperties: false
          required:
            - ok
            - error
          properties:
            ok:
              type: boolean
              const: false
            error:
              type: string

    SendMessageAck:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            - ok
          properties:
            ok:
              type: boolean
              const: true
        - type: object
          additionalProperties: false
          required:
            - ok
            - error
          properties:
            ok:
              type: boolean
              const: false
            error:
              type: string
              
    WebRTCOfferPayload:
      type: object
      required:
        - roomId
        - toPeerId
        - sdp
      properties:
        roomId:
          type: string
        toPeerId:
          type: string
        sdp:
          type: object

    WebRTCAnswerPayload:
      type: object
      required:
        - roomId
        - toPeerId
        - sdp
      properties:
        roomId:
          type: string
        toPeerId:
          type: string
        sdp:
          type: object

    WebRTCIceCandidatePayload:
      type: object
      required:
        - roomId
        - toPeerId
        - candidate
      properties:
        roomId:
          type: string
        toPeerId:
          type: string
        candidate:
          type: object

    Participant:
      type: object
      properties:
        id:
          type: string
        uid:
          type: string
        name:
          type: string
        role:
          type: string
        avatarUrl:
          type: string
          nullable: true

    PeerMediaState:
      type: object
      properties:
        audioEnabled:
          type: boolean
        videoEnabled:
          type: boolean
        screenSharing:
          type: boolean

    PeerJoinedPayload:
      type: object
      properties:
        peer:
          $ref: '#/components/schemas/Participant'
        mediaState:
          $ref: '#/components/schemas/PeerMediaState'

    PeerLeftPayload:
      type: object
      properties:
        peerId:
          type: string

    MediaStatePayload:
      type: object
      required:
        - roomId
        - audioEnabled
        - videoEnabled
        - screenSharing
      properties:
        roomId:
          type: string
        audioEnabled:
          type: boolean
        videoEnabled:
          type: boolean
        screenSharing:
          type: boolean

    MediaStateChangedPayload:
      type: object
      properties:
        peerId:
          type: string
        audioEnabled:
          type: boolean
        videoEnabled:
          type: boolean
        screenSharing:
          type: boolean